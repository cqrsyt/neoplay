<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoPlay - 未来游戏宇宙</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">NEO<span>PLAY</span></div>
            <ul>
                <li onclick="showQuiz()">🎯 游戏推荐</li>
                <li onclick="showGames()">🎮 所有游戏</li>
                <li onclick="showAI()">🤖 AI导师</li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section id="hero" class="hero">
            <h1>探索无限棋类宇宙</h1>
            <p>科技 · 策略 · 社交 · 无限乐趣</p>
            <button onclick="showQuiz()">开始推荐之旅</button>
        </section>
        
        <!-- Quiz Section -->
        <section id="quiz" class="section hidden">
            <h2>游戏推荐问答</h2>
            <div id="quiz-questions"></div>
            <button onclick="submitQuiz()">提交获取推荐</button>
            <div id="recommendation"></div>
        </section>
        
        <!-- Games Section -->
        <section id="games-list" class="section hidden">
            <h2>经典棋类游戏</h2>
            <div class="game-grid"></div>
        </section>
    </main>
    
    <!-- AI Chat -->
    <div id="ai-assistant" class="ai-chat hidden">
        <div class="chat-header">AI游戏导师</div>
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="问我游戏规则或策略...">
        <button onclick="sendMessage()">发送</button>
    </div>
    
    <!-- 教程模态框 -->
    <div id="game-modal" class="modal hidden">
        <div class="modal-content">
            <span onclick="closeModal()" style="float:right; cursor:pointer; font-size:2.5rem; color:#ff00aa;">×</span>
            <h2 id="modal-title"></h2>
            <div id="modal-content"></div>
            <canvas id="game-canvas" width="480" height="480" style="background:#111; border:2px solid #00ffcc; margin:20px auto; display:block;"></canvas>
            <button onclick="startSimpleGame()" style="margin-top:20px; padding:15px 40px; font-size:1.1rem;">🎮 开始真实游玩</button>
        </div>
    </div>
    
    <footer>
        <p>快捷键: Q - 推荐, G - 游戏列表, A - AI助手, Esc - 关闭</p>
    </footer>
</body>
</html>
